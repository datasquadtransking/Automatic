<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista - Unilever</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: black; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <iframe id="dash1" class="active" src="https://app.powerbi.com/view?r=eyJrIjoiMjZjMjI1NjUtOWQxZi00YWMwLTg2YzMtZWFkMGYxMTNmMGJhIiwidCI6IjI3YzVjYTFiLWQ5YWQtNDA0ZS04YjFkLWNlYzY5ODBjNmYzNCJ9&pageName=5013101cbffe8126f1ef"></iframe>
    <iframe id="dash2" src="https://app.powerbi.com/view?r=eyJrIjoiMjZjMjI1NjUtOWQxZi00YWMwLTg2YzMtZWFkMGYxMTNmMGJhIiwidCI6IjI3YzVjYTFiLWQ5YWQtNDA0ZS04YjFkLWNlYzY5ODBjNmYzNCJ9&pageName=335ca4cb938fa2cc7b11"></iframe>
    <iframe id="dash3" src="https://app.powerbi.com/view?r=eyJrIjoiOTI4NjE1ZjYtMjI0NC00Y2JhLTgwMWItYmQ2YmFlZWE0YjkyIiwidCI6IjI3YzVjYTFiLWQ5YWQtNDA0ZS04YjFkLWNlYzY5ODBjNmYzNCJ9"></iframe>
    <iframe id="dash4" src="https://app.powerbi.com/view?r=eyJrIjoiOTI4NjE1ZjYtMjI0NC00Y2JhLTgwMWItYmQ2YmFlZWE0YjkyIiwidCI6IjI3YzVjYTFiLWQ5YWQtNDA0ZS04YjFkLWNlYzY5ODBjNmYzNCJ9&pageName=30e5e34ec6bdd023ed2c"></iframe>

    <script>
        var current = 0;
        var iframes = document.querySelectorAll('iframe');
        var time = 10000; // 10 segundos

        setInterval(function() {
            // Remove a classe active de todos os iframes
            iframes.forEach(function(iframe) {
                iframe.classList.remove('active');
            });

            // Avança para o próximo índice
            current = (current + 1) % iframes.length;

            // Adiciona active ao iframe atual
            iframes[current].classList.add('active');
        }, time);
    </script>
</body>
</html>
