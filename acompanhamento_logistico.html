
    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="refresh" content="60">
        <title>Dashboard de Chegadas</title>
        <style>
            body { font-family: Arial, sans-serif; background: #f4f4f9; text-align: center; }
            .container { display: flex; justify-content: space-around; margin-top: 50px; }
            .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 30%; }
            .on-time { color: green; font-size: 2em; font-weight: bold; }
            .total { color: #555; }
            h1 { color: #333; }
        </style>
    </head>
    <body>
        <h1>Acompanhamento Diário Unilever</h1>
        <p>Última atualização: 06/04/2026 12:09:43</p>
        <div class="container">
            <div class="card">
                <h2>Coletas</h2>
                <div class="on-time">0 <small>no prazo</small></div>
                <div class="total">Total: 3</div>
            </div>
            <div class="card">
                <h2>Entregas</h2>
                <div class="on-time">0 <small>no prazo</small></div>
                <div class="total">Total: 1</div>
            </div>
        </div>
    </body>
    </html>
